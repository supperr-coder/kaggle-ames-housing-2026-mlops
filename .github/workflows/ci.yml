name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements-api.txt
          pip install pytest httpx

      - name: Run tests
        run: pytest tests/ -v

# You push code → GitHub sees the push → spins up a server → installs your packages → runs your tests → tells you pass or fail